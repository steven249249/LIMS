# ---------------------------------------------------------------------------
# LIMS production stack — HTTPS / port 443 via Caddy + Let's Encrypt
#
# Pre-flight checklist on the host machine:
#   1. Ports 80 and 443 must be reachable from the public internet.
#      (Let's Encrypt's HTTP-01 challenge needs port 80 open.)
#   2. DNS A record `lims.ddns.net` must point at this host's public IP.
#   3. Copy `.env.example` → `.env` and fill in the real secrets.
#
# Then:
#   docker compose --env-file .env up -d --build
#
# First start takes ~30 s while Caddy negotiates the TLS certificate.
# After that the LIMS lives at https://lims.ddns.net (port 443).
# ---------------------------------------------------------------------------

services:
  # ── MySQL ────────────────────────────────────────────────────
  mysql:
    image: mysql:8.0
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-rootpwd}
      MYSQL_DATABASE: ${DB_NAME:-lab_booking}
      MYSQL_USER: ${DB_USER:-lab_user}
      MYSQL_PASSWORD: ${DB_PASSWORD:-lab_pass}
    # No host port mapping — MySQL is reachable only on the internal docker
    # network, never from the public internet.
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 5s
      timeout: 5s
      retries: 10

  # ── Redis ────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    restart: always

  # ── Django Backend API ───────────────────────────────────────
  backend:
    build: ./backend
    restart: always
    environment:
      DJANGO_SECRET_KEY: ${DJANGO_SECRET_KEY:?set DJANGO_SECRET_KEY in .env}
      DJANGO_DEBUG: "False"
      DJANGO_PRODUCTION: "True"
      DJANGO_ALLOWED_HOSTS: "${DJANGO_ALLOWED_HOSTS:-lims.ddns.net}"
      LIMS_ADMIN_PASSWORD: "${LIMS_ADMIN_PASSWORD:-Admin@LIMS_2026!Sup}"
      DB_ENGINE: mysql
      DB_NAME: ${DB_NAME:-lab_booking}
      DB_USER: ${DB_USER:-lab_user}
      DB_PASSWORD: ${DB_PASSWORD:-lab_pass}
      DB_HOST: mysql
      DB_PORT: "3306"
      REDIS_URL: redis://redis:6379/0
      CELERY_BROKER_URL: redis://redis:6379/0
      CORS_ALLOWED_ORIGINS: "${CORS_ALLOWED_ORIGINS:-https://lims.ddns.net}"
      SENTRY_DSN: "${SENTRY_DSN:-}"
    expose:
      - "8000"
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_started
    # Single-line sh -c so YAML folding doesn't sneak in literal newlines that
    # `sh` then mis-reads as separate commands. `exec` hands PID 1 to gunicorn
    # so `docker stop` sends SIGTERM straight to the worker (fast clean shutdown).
    command: sh -c "python manage.py migrate --noinput && exec gunicorn backend.wsgi:application --bind 0.0.0.0:8000 --workers 4 --access-logfile - --error-logfile -"

  # ── Celery Worker (no critical-path job uses it yet — kept hot) ─
  celery:
    build: ./backend
    restart: always
    environment:
      DJANGO_SECRET_KEY: ${DJANGO_SECRET_KEY:?set DJANGO_SECRET_KEY in .env}
      DJANGO_PRODUCTION: "True"
      # settings.py refuses to import without DJANGO_ALLOWED_HOSTS in
      # production mode — the worker doesn't actually serve HTTP, but it
      # imports the same settings module as the API. Mirror what backend has.
      DJANGO_ALLOWED_HOSTS: "${DJANGO_ALLOWED_HOSTS:-lims.ddns.net}"
      DB_ENGINE: mysql
      DB_NAME: ${DB_NAME:-lab_booking}
      DB_USER: ${DB_USER:-lab_user}
      DB_PASSWORD: ${DB_PASSWORD:-lab_pass}
      DB_HOST: mysql
      DB_PORT: "3306"
      REDIS_URL: redis://redis:6379/0
      CELERY_BROKER_URL: redis://redis:6379/0
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_started
    command: celery -A backend worker -l info

  # ── Caddy: SPA + reverse proxy + automatic HTTPS ─────────────
  frontend:
    build: ./frontend
    restart: always
    environment:
      ADMIN_EMAIL: "${ADMIN_EMAIL:-admin@lims.ddns.net}"
    ports:
      - "80:80"     # HTTP — Caddy auto-redirects to HTTPS
      - "443:443"   # HTTPS
    volumes:
      # Persist the Let's Encrypt certificate + ACME state across restarts.
      # Without this every restart would re-issue from scratch and hit the
      # ACME rate limit (5 duplicate certs per week).
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      - backend

volumes:
  mysql_data:
  caddy_data:
  caddy_config:
