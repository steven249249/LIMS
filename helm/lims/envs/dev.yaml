# dev — minimal resources, demo data on, autosync.
# DNS: needs its own DDNS subdomain. Easiest path: register a second
# free DDNS hostname (e.g. lims-dev.ddns.net) at no-ip / dynu /
# whichever provider hosts lims.ddns.net, point it at the dev cluster's
# Ingress static IP. If you only have one hostname for now, skip the
# dev env and deploy directly to prod or to staging.
env: dev
ingress:
  host: lims-dev.ddns.net
  staticIp: lims-dev-ingress-ip
backend:
  replicas: 1
  resources:
    requests: { cpu: 100m, memory: 256Mi }
    limits:   { cpu: 500m, memory: 512Mi }
  hpa:
    enabled: false
    min: 1
    max: 2
  pdb:
    minAvailable: 0
  gunicornWorkers: 2
frontend:
  replicas: 1
celery:
  enabled: false                    # no real tasks yet; keep dev cheap
cloudSql:
  connectionName: REPLACE-ME:us-central1:lims-dev
config:
  DJANGO_DEBUG: "False"
  DJANGO_PRODUCTION: "True"
  DJANGO_ALLOWED_HOSTS: lims-dev.ddns.net
  CORS_ALLOWED_ORIGINS: https://lims-dev.ddns.net
  CSRF_TRUSTED_ORIGINS: https://lims-dev.ddns.net
  SEED_DEMO_DATA: "True"            # dev clusters get the demo accounts/lots
  DJANGO_LOG_LEVEL: DEBUG
  SENTRY_ENVIRONMENT: dev
externalSecrets:
  prefix: lims-dev
serviceAccount:
  gsaEmail: lims-dev-runtime@REPLACE-ME.iam.gserviceaccount.com
