# dev — minimal resources, demo data on, autosync.
env: dev
ingress:
  host: dev.lims.example.com
  staticIp: lims-dev-ingress-ip
backend:
  replicas: 1
  resources:
    requests: { cpu: 100m, memory: 256Mi }
    limits:   { cpu: 500m, memory: 512Mi }
  hpa:
    enabled: false
    min: 1
    max: 2
  pdb:
    minAvailable: 0
  gunicornWorkers: 2
frontend:
  replicas: 1
celery:
  enabled: false                    # no real tasks yet; keep dev cheap
cloudSql:
  connectionName: REPLACE-ME:us-central1:lims-dev
config:
  DJANGO_DEBUG: "False"
  DJANGO_PRODUCTION: "True"
  DJANGO_ALLOWED_HOSTS: dev.lims.example.com
  CORS_ALLOWED_ORIGINS: https://dev.lims.example.com
  CSRF_TRUSTED_ORIGINS: https://dev.lims.example.com
  SEED_DEMO_DATA: "True"            # dev clusters get the demo accounts/lots
  DJANGO_LOG_LEVEL: DEBUG
  SENTRY_ENVIRONMENT: dev
externalSecrets:
  prefix: lims-dev
serviceAccount:
  gsaEmail: lims-dev-runtime@REPLACE-ME.iam.gserviceaccount.com
