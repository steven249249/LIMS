# staging — production-like topology at half the size.
env: staging
ingress:
  host: lims-staging.ddns.net
  staticIp: lims-staging-ingress-ip
backend:
  replicas: 2
  hpa: { enabled: true, min: 2, max: 4, targetCPUUtilizationPercentage: 70 }
  pdb: { minAvailable: 1 }
frontend:
  replicas: 1
celery:
  enabled: true
  replicas: 1
cloudSql:
  connectionName: REPLACE-ME:us-central1:lims-staging
config:
  DJANGO_DEBUG: "False"
  DJANGO_PRODUCTION: "True"
  DJANGO_ALLOWED_HOSTS: lims-staging.ddns.net
  CORS_ALLOWED_ORIGINS: https://lims-staging.ddns.net
  CSRF_TRUSTED_ORIGINS: https://lims-staging.ddns.net
  SEED_DEMO_DATA: "False"
  SENTRY_ENVIRONMENT: staging
externalSecrets:
  prefix: lims-staging
serviceAccount:
  gsaEmail: lims-staging-runtime@REPLACE-ME.iam.gserviceaccount.com
