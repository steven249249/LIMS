# prod — full HPA, strict security, no auto-sync (Argo flag, not Helm).
# DNS: lims.ddns.net A record points at the GCLB static IP reserved by
# infra/envs/prod (output: ingress_ip). DDNS provider must allow updates
# from a static IP; once the static IP is allocated, lock the A record.
env: prod
ingress:
  host: lims.ddns.net
  staticIp: lims-prod-ingress-ip
backend:
  replicas: 3
  resources:
    requests: { cpu: 500m, memory: 1Gi }
    limits:   { cpu: "2",  memory: 2Gi }
  hpa: { enabled: true, min: 3, max: 10, targetCPUUtilizationPercentage: 70 }
  pdb: { minAvailable: 2 }
  gunicornWorkers: 6
frontend:
  replicas: 2
  hpa: { enabled: true, min: 2, max: 5, targetCPUUtilizationPercentage: 70 }
celery:
  enabled: true
  replicas: 1
cloudSql:
  connectionName: REPLACE-ME:us-central1:lims-prod
config:
  DJANGO_DEBUG: "False"
  DJANGO_PRODUCTION: "True"
  DJANGO_ALLOWED_HOSTS: lims.ddns.net
  CORS_ALLOWED_ORIGINS: https://lims.ddns.net
  CSRF_TRUSTED_ORIGINS: https://lims.ddns.net
  SEED_DEMO_DATA: "False"
  SENTRY_ENVIRONMENT: prod
externalSecrets:
  prefix: lims-prod
serviceAccount:
  gsaEmail: lims-prod-runtime@REPLACE-ME.iam.gserviceaccount.com
