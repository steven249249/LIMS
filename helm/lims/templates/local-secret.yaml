{{- if not .Values.externalSecrets.enabled -}}
# Plain in-cluster Secret used in kind / local validation only. Production
# always goes through ExternalSecret + GCP Secret Manager.
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "lims.fullname" . }}-secrets
  labels: {{- include "lims.labels" . | nindent 4 }}
type: Opaque
stringData:
  DJANGO_SECRET_KEY: {{ .Values.localSecrets.djangoSecretKey | quote }}
  DB_PASSWORD: {{ .Values.localSecrets.dbPassword | quote }}
  LIMS_ADMIN_PASSWORD: {{ .Values.localSecrets.limsAdminPassword | quote }}
  SENTRY_DSN: ""
{{- end }}
