{{- if .Values.celery.enabled -}}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "lims.fullname" . }}-celery
  labels: {{- include "lims.componentLabels" (dict "root" . "component" "celery") | nindent 4 }}
spec:
  replicas: {{ .Values.celery.replicas }}
  selector:
    matchLabels: {{- include "lims.componentSelector" (dict "root" . "component" "celery") | nindent 6 }}
  template:
    metadata:
      labels: {{- include "lims.componentLabels" (dict "root" . "component" "celery") | nindent 8 }}
      annotations:
        checksum/config: {{ include "lims.configHash" . }}
    spec:
      serviceAccountName: {{ include "lims.fullname" . }}
      terminationGracePeriodSeconds: 60                  # let in-flight tasks finish
      securityContext: {{- include "lims.podSecurityContext" . | nindent 8 }}
      containers:
        - name: worker
          image: {{ include "lims.image.backend" . | quote }}
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          command: ["celery", "-A", "backend", "worker", "-l", "info", "--max-tasks-per-child=200"]
          envFrom:
            - configMapRef: { name: {{ include "lims.fullname" . }}-config }
            {{- if .Values.externalSecrets.enabled }}
            - secretRef:    { name: {{ include "lims.fullname" . }}-secrets }
            {{- end }}
          resources: {{- toYaml .Values.celery.resources | nindent 12 }}
          livenessProbe:
            exec:
              command:
                - sh
                - -c
                - 'celery -A backend inspect ping -d celery@$HOSTNAME --timeout 5'
            periodSeconds: 60
            timeoutSeconds: 10
            failureThreshold: 3
          securityContext: {{- include "lims.containerSecurityContext" . | nindent 12 }}
          volumeMounts:
            - { name: tmp, mountPath: /tmp }

        {{- if .Values.cloudSql.enabled }}
        - name: cloud-sql-proxy
          image: gcr.io/cloud-sql-connectors/cloud-sql-proxy:2.14.2
          args: ["--private-ip", "--port=3306", {{ .Values.cloudSql.connectionName | quote }}]
          resources:
            requests: { cpu: 50m, memory: 64Mi }
            limits:   { cpu: 500m, memory: 256Mi }
          securityContext:
            runAsNonRoot: true
            runAsUser: 65532
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities: { drop: ["ALL"] }
        {{- end }}
      volumes:
        - { name: tmp, emptyDir: {} }
{{- end }}
