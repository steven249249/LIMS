{{- if .Values.migrate.enabled -}}
# Argo CD Sync hook (NOT PreSync). PreSync runs before any sync wave —
# meaning before the ConfigMap + Secret this Job depends on. Sync hooks
# respect sync-wave instead, so we use:
#   wave -10  → ServiceAccount + ConfigMap + Secret (annotated below)
#   wave  -5  → this migrate Job
#   wave   0  → Deployments, Services (default)
# Argo waits for each wave to be Healthy before the next, so Deployments
# still won't roll until migrations succeed.
apiVersion: batch/v1
kind: Job
metadata:
  name: {{ include "lims.fullname" . }}-migrate
  labels: {{- include "lims.componentLabels" (dict "root" . "component" "migrate") | nindent 4 }}
  annotations:
    argocd.argoproj.io/hook: Sync
    argocd.argoproj.io/hook-delete-policy: BeforeHookCreation
    argocd.argoproj.io/sync-wave: "-5"
spec:
  backoffLimit: 0
  ttlSecondsAfterFinished: 600
  template:
    metadata:
      labels: {{- include "lims.componentLabels" (dict "root" . "component" "migrate") | nindent 8 }}
    spec:
      restartPolicy: Never
      serviceAccountName: {{ include "lims.serviceAccountName" . }}
      securityContext: {{- include "lims.podSecurityContext" . | nindent 8 }}
      containers:
        - name: migrate
          image: {{ include "lims.image.backend" . | quote }}
          command: ["python", "manage.py", "migrate", "--noinput"]
          envFrom:
            - configMapRef: { name: {{ include "lims.fullname" . }}-config }
            # The Secret is created either by ExternalSecret (prod) or
            # by templates/local-secret.yaml (kind) — same name either way.
            - secretRef:    { name: {{ include "lims.fullname" . }}-secrets }
          resources: {{- toYaml .Values.migrate.resources | nindent 12 }}
          securityContext: {{- include "lims.containerSecurityContext" . | nindent 12 }}
          volumeMounts:
            - { name: tmp, mountPath: /tmp }
        {{- if .Values.cloudSql.enabled }}
        - name: cloud-sql-proxy
          image: gcr.io/cloud-sql-connectors/cloud-sql-proxy:2.14.2
          # --quitquitquit lets the sidecar exit when the migration container does
          args: ["--private-ip", "--port=3306", "--quitquitquit",
                 {{ .Values.cloudSql.connectionName | quote }}]
          resources:
            requests: { cpu: 50m, memory: 64Mi }
            limits:   { cpu: 500m, memory: 256Mi }
          securityContext:
            runAsNonRoot: true
            runAsUser: 65532
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities: { drop: ["ALL"] }
        {{- end }}
      volumes:
        - { name: tmp, emptyDir: {} }
{{- end }}
