apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "lims.fullname" . }}-config
  labels: {{- include "lims.labels" . | nindent 4 }}
data:
  # Cloud SQL Auth Proxy listens on localhost; backend always talks to 127.0.0.1.
  DB_ENGINE: mysql
  DB_HOST: "127.0.0.1"
  DB_PORT: "3306"
  DB_NAME: {{ .Values.cloudSql.databaseName | quote }}
  DB_USER: lims_app
  REDIS_URL: {{ .Values.redis.url | quote }}
  CELERY_BROKER_URL: {{ default .Values.redis.url .Values.redis.brokerUrl | quote }}
  GUNICORN_WORKERS: {{ .Values.backend.gunicornWorkers | quote }}
  {{- range $k, $v := .Values.config }}
  {{ $k }}: {{ $v | quote }}
  {{- end }}
