{{- if .Values.backend.hpa.enabled }}
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: {{ include "lims.fullname" . }}-backend
  labels: {{- include "lims.componentLabels" (dict "root" . "component" "backend") | nindent 4 }}
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: {{ include "lims.fullname" . }}-backend
  minReplicas: {{ .Values.backend.hpa.min }}
  maxReplicas: {{ .Values.backend.hpa.max }}
  metrics:
    - type: Resource
      resource:
        name: cpu
        target: { type: Utilization, averageUtilization: {{ .Values.backend.hpa.targetCPUUtilizationPercentage }} }
  behavior:
    scaleUp:   { stabilizationWindowSeconds: 30  }
    scaleDown: { stabilizationWindowSeconds: 300 }
---
{{- end }}
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: {{ include "lims.fullname" . }}-backend
  labels: {{- include "lims.componentLabels" (dict "root" . "component" "backend") | nindent 4 }}
spec:
  minAvailable: {{ .Values.backend.pdb.minAvailable }}
  selector:
    matchLabels: {{- include "lims.componentSelector" (dict "root" . "component" "backend") | nindent 6 }}
{{- if .Values.frontend.hpa.enabled }}
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: {{ include "lims.fullname" . }}-frontend
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: {{ include "lims.fullname" . }}-frontend
  minReplicas: {{ .Values.frontend.hpa.min }}
  maxReplicas: {{ .Values.frontend.hpa.max }}
  metrics:
    - type: Resource
      resource:
        name: cpu
        target: { type: Utilization, averageUtilization: {{ .Values.frontend.hpa.targetCPUUtilizationPercentage }} }
{{- end }}
