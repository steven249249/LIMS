{{- if .Values.serviceAccount.create -}}
apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ include "lims.fullname" . }}
  labels: {{- include "lims.labels" . | nindent 4 }}
  annotations:
    # Workload Identity: pods using this KSA impersonate this GSA, which
    # has roles/cloudsql.client + roles/secretmanager.secretAccessor on the
    # right secrets. No service-account key files anywhere.
    iam.gke.io/gcp-service-account: {{ .Values.serviceAccount.gsaEmail | quote }}
{{- end }}
