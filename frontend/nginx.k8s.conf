server {
  listen       8080 default_server;
  listen       [::]:8080 default_server;
  server_name  _;

  root /usr/share/nginx/html;
  index index.html;

  # Compression — nginx-served static assets compress well.
  gzip on;
  gzip_vary on;
  gzip_proxied any;
  gzip_min_length 1024;
  gzip_types text/plain text/css application/json application/javascript text/xml application/xml application/xml+rss text/javascript image/svg+xml;

  # Kubernetes probes — return immediately, no logs.
  location = /healthz { return 200 "ok\n"; access_log off; }
  location = /readyz  { return 200 "ok\n"; access_log off; }

  # In production the GKE Ingress routes /api/* and /admin/* to the
  # backend Service directly, so this proxy block is a no-op there.
  # In local kind validation we expose the SPA via port-forward, so the
  # browser hits nginx for everything; we must forward backend paths
  # ourselves. The upstream resolves via the in-cluster DNS that the
  # frontend pod inherits from kube-dns.
  location /api/ {
    proxy_pass http://lims-lims-backend:8000;
    proxy_set_header Host $host;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header X-Real-IP $remote_addr;
  }
  location /admin/ {
    proxy_pass http://lims-lims-backend:8000;
    proxy_set_header Host $host;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
  }
  location /django-admin/ {
    proxy_pass http://lims-lims-backend:8000;
    proxy_set_header Host $host;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
  }
  location /static/ {
    proxy_pass http://lims-lims-backend:8000;
    proxy_set_header Host $host;
  }

  # Long-lived caching for hashed asset filenames; the SPA uses
  # content-hashed bundles so cache-bust comes for free on a new build.
  location ~* \.(?:js|css|woff2?|eot|ttf|svg|png|jpg|jpeg|gif|ico)$ {
    add_header Cache-Control "public, immutable, max-age=31536000";
    try_files $uri =404;
  }

  # SPA fallback — every unknown path serves index.html so Vue Router
  # handles client-side routes like /orders/review.
  location / {
    add_header Cache-Control "no-cache, must-revalidate";
    try_files $uri $uri/ /index.html;
  }
}
