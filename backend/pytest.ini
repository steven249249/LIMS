[pytest]
DJANGO_SETTINGS_MODULE = backend.settings
python_files = tests.py test_*.py *_tests.py
addopts =
    --strict-markers
    --reuse-db
    --tb=short
    -ra
    -p no:launch_testing
    -p no:launch_testing_ros
markers =
    unit: pure unit test (no DB, fast)
    integration: end-to-end via DRF APIClient
    slow: marked slow, skipped by default in CI fast lane
filterwarnings =
    ignore::DeprecationWarning:django.*
    ignore::DeprecationWarning:rest_framework.*
