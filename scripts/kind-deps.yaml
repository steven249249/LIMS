# In-cluster MySQL + Redis for kind validation only.
# Replaces the bitnami chart (whose public images were taken offline).
# Service names match what helm/lims/envs/local.yaml expects.
---
apiVersion: v1
kind: Namespace
metadata: { name: lims-local }
---
# ── MySQL 8 ─────────────────────────────────────────────────────────────
apiVersion: v1
kind: Secret
metadata:
  name: lims-mysql
  namespace: lims-local
type: Opaque
stringData:
  MYSQL_ROOT_PASSWORD: kind-mysql-root
  MYSQL_DATABASE: lab_booking
---
apiVersion: v1
kind: Service
metadata:
  name: lims-mysql
  namespace: lims-local
spec:
  selector: { app: lims-mysql }
  ports: [{ port: 3306, targetPort: 3306, protocol: TCP }]
---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: lims-mysql
  namespace: lims-local
spec:
  serviceName: lims-mysql
  replicas: 1
  selector:
    matchLabels: { app: lims-mysql }
  template:
    metadata:
      labels: { app: lims-mysql }
    spec:
      containers:
        - name: mysql
          image: mysql:8.0
          ports: [{ containerPort: 3306, name: mysql }]
          envFrom: [{ secretRef: { name: lims-mysql } }]
          args:
            - --default-authentication-plugin=mysql_native_password
            - --character-set-server=utf8mb4
            - --collation-server=utf8mb4_0900_ai_ci
          readinessProbe:
            exec: { command: ["sh","-c","mysqladmin ping -h 127.0.0.1 -uroot -p$$MYSQL_ROOT_PASSWORD"] }
            periodSeconds: 5
            initialDelaySeconds: 10
          livenessProbe:
            exec: { command: ["sh","-c","mysqladmin ping -h 127.0.0.1 -uroot -p$$MYSQL_ROOT_PASSWORD"] }
            periodSeconds: 30
            initialDelaySeconds: 30
          volumeMounts:
            - { name: data, mountPath: /var/lib/mysql }
      volumes:
        - { name: data, emptyDir: {} }   # ephemeral; kind validation only
---
# ── Redis 7 ─────────────────────────────────────────────────────────────
apiVersion: v1
kind: Service
metadata:
  name: lims-redis-master
  namespace: lims-local
spec:
  selector: { app: lims-redis }
  ports: [{ port: 6379, targetPort: 6379, protocol: TCP }]
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: lims-redis
  namespace: lims-local
spec:
  replicas: 1
  selector:
    matchLabels: { app: lims-redis }
  template:
    metadata:
      labels: { app: lims-redis }
    spec:
      containers:
        - name: redis
          image: redis:7-alpine
          args: ["--save", "", "--appendonly", "no"]   # in-memory only
          ports: [{ containerPort: 6379, name: redis }]
          readinessProbe:
            exec: { command: ["redis-cli", "ping"] }
            periodSeconds: 5
          livenessProbe:
            exec: { command: ["redis-cli", "ping"] }
            periodSeconds: 30
