kind: Cluster
apiVersion: kind.x-k8s.io/v1alpha4
name: lims-local
nodes:
  - role: control-plane
    kubeadmConfigPatches:
      - |
        kind: InitConfiguration
        nodeRegistration:
          kubeletExtraArgs:
            node-labels: "ingress-ready=true"
    extraPortMappings:
      # Map host :8080 → node :30080 → backend NodePort, so you can curl
      # http://localhost:8080/healthz from the host without port-forwarding.
      - containerPort: 30080
        hostPort: 8080
        protocol: TCP
      - containerPort: 30443
        hostPort: 8443
        protocol: TCP
