kind: Cluster
apiVersion: kind.x-k8s.io/v1alpha4
name: lims-local
nodes:
  - role: control-plane
    kubeadmConfigPatches:
      - |
        kind: InitConfiguration
        nodeRegistration:
          kubeletExtraArgs:
            node-labels: "ingress-ready=true"
    # Intentionally NO extraPortMappings: the chart uses ClusterIP
    # Services (no NodePort), so kind's NodePort handler on the host
    # would just reset connections. Use `kubectl port-forward` instead:
    #
    #   kubectl port-forward -n lims-local svc/lims-lims-frontend 18080:8080
    #
    # then open http://localhost:18080/.
