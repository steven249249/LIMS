kind: Cluster
apiVersion: kind.x-k8s.io/v1alpha4
name: lims-local
nodes:
  - role: control-plane
    kubeadmConfigPatches:
      - |
        kind: InitConfiguration
        nodeRegistration:
          kubeletExtraArgs:
            node-labels: "ingress-ready=true"
    extraPortMappings:
      # Map host :8080 → node :30080. helm/lims/envs/local.yaml pins
      # the frontend Service to type=NodePort + nodePort=30080, so
      # http://localhost:8080/ goes straight to the SPA — no
      # `kubectl port-forward` needed in local validation.
      - containerPort: 30080
        hostPort: 8080
        protocol: TCP
